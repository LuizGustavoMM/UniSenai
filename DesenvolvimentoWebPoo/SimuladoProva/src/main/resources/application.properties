spring.application.name=SimuladoProva

# Configuracao da conexao com o banco PostgreSQL da prova.
# O nome exigido para o banco e prova_pratica.
spring.datasource.url=jdbc:postgresql://localhost:5432/prova_pratica
spring.datasource.username=postgres
spring.datasource.password=senai
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracoes do JPA/Hibernate.
# update cria ou atualiza as tabelas automaticamente com base nas entidades.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
