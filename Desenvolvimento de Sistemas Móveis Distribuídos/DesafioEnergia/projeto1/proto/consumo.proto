syntax = "proto3";



option java_multiple_files = true;

option java_package = "br.com.energia.grpc";



service MedidorService {

 rpc EnviarLeitura (LeituraRequest) returns (LeituraResponse);

}



message LeituraRequest {

 string id_casa = 1;

 double consumo_kwh = 2;

}



message LeituraResponse {

 bool sucesso = 1;

}